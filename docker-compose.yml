services:
  site:
    build: .
    restart: always
    networks:
      - shared
  reverse-proxy:
    image: nginx:stable-alpine
    restart: always
    depends_on:
      - site
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - ./static:/usr/share/nginx/static:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "443:443"
      - "80:80"
    networks:
      - shared

networks:
  shared:
    external: True
    name: booking_net